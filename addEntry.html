        <p> Easily add a blog entry here. </p>
        <form method="POST" id="addblog"> <!-- sends data below HTTP header, no limit on chars, needed for blog -->
            <p> Insert blog title </p>
            <input id="blogtitleinp" required type="text" name="Title" placeholder="My top 3 programming languages..."/>
            <p> Insert blog content </p>
            <textarea id="blogcontentinp" required type="textarea" name="Content"> My favourite language is JavaScript because... </textarea>
            <p> Publish blog! </p>
            <input id="sendblog" type="submit" value="Publish" />
        </form>
